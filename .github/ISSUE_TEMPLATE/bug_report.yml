name: Bug report
description: Report a bug in forge
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction — the objective you passed to `/forge`, any relevant repo state.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: forge version
      description: See `.claude-plugin/plugin.json`
      placeholder: "0.4.0"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v22.x"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Output of `/forge-status` or the contents of `.forge/logs/<runId>.jsonl` around the failure. Redact anything sensitive.
      render: shell
